services:
  crabshell.sample:
    depends_on:
      - db
    image: crabshell.sample
    ports:
      - "7000:8080"
    build:
      context: .
      dockerfile: Crabshell.Sample/Dockerfile

  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=123123123
      - POSTGRES_USER=postgres
      - POSTGRES_DB=crabshell-test